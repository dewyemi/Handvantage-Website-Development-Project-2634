# Netlify config for workspace.handvantage.com (Next.js 14 App Router subdirectory)
# Use this as the "Base directory" when creating the Netlify site:
#   Base directory:  workspace-handvantage-com
#   Build command:   npm run build
#   Publish:         (auto, handled by @netlify/plugin-nextjs)
# DNS: CNAME workspace.handvantage.com → <site>.netlify.app

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# Long-cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
