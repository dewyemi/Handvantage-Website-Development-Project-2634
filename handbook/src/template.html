<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Agentic AI Procurement Handbook — Handvantage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..900&family=Inter+Tight:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ------------------------------------------------------------------ */
/* PAGE SETUP — 8.5x11 letter, generous margins, asymmetric for       */
/* page numbers. Print color management on so cream backgrounds and   */
/* oxblood accents render predictably on screen + paper.              */
/* ------------------------------------------------------------------ */
@page {
  size: letter;
  margin: 0;
}
@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* ------------------------------------------------------------------ */
/* DESIGN TOKENS — match workspace.handvantage.com brand              */
/* ------------------------------------------------------------------ */
:root {
  --paper: #F5F1EA;
  --paper-deep: #EAE3D5;
  --ink: #1A1F1B;
  --ink-soft: #4A4F4B;
  --ink-hairline: #D2C9B7;
  --oxblood: #722F37;
  --gold: #A16207;
  --gold-soft: #C9A36A;
  --midnight: #0F1A1F;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 10.5pt;
  line-height: 1.55;
  color: var(--ink);
  background: white;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ------------------------------------------------------------------ */
/* PAGE STRUCTURE — every page renders inside .page (8.5x11), with    */
/* an inner .page-content (margins applied) holding the body.         */
/* ------------------------------------------------------------------ */
.page {
  width: 8.5in;
  height: 11in;
  position: relative;
  page-break-after: always;
  break-after: page;
  overflow: hidden;
}
.page:last-child { page-break-after: auto; break-after: auto; }
.page-content {
  position: absolute;
  top: 1in;
  left: 0.85in;
  right: 1.1in;
  bottom: 0.9in;
}

/* ------------------------------------------------------------------ */
/* COVER PAGE                                                         */
/* ------------------------------------------------------------------ */
.cover {
  background: var(--paper);
  display: flex;
  flex-direction: column;
  padding: 1.2in 1in;
}
.cover .brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.cover .brand .h-mark {
  width: 38px; height: 38px;
  background: var(--oxblood);
  color: var(--paper);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Source Serif 4', serif;
  font-weight: 700;
  font-size: 24pt;
  line-height: 1;
}
.cover .brand .name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.cover .eyebrow {
  margin-top: 2.2in;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10pt;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--oxblood);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--oxblood);
  display: inline-block;
  align-self: flex-start;
}
.cover h1 {
  font-family: 'Source Serif 4', serif;
  font-weight: 300;
  font-size: 56pt;
  line-height: 1.0;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-top: 36pt;
  max-width: 6in;
}
.cover h1 .em {
  font-style: italic;
  color: var(--oxblood);
}
.cover .subtitle {
  font-family: 'Source Serif 4', serif;
  font-weight: 400;
  font-size: 14pt;
  line-height: 1.4;
  color: var(--ink-soft);
  margin-top: 24pt;
  max-width: 5in;
}
.cover .footer {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.cover .footer .right { text-align: right; }
.cover .footer .right .version { color: var(--ink); }

/* ------------------------------------------------------------------ */
/* INSIDE COVER / COLOPHON                                            */
/* ------------------------------------------------------------------ */
.colophon {
  background: white;
}
.colophon .label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--oxblood);
  margin-bottom: 16pt;
  padding-bottom: 6pt;
  border-bottom: 1px solid var(--oxblood);
  display: inline-block;
}
.colophon h2 {
  font-family: 'Source Serif 4', serif;
  font-weight: 400;
  font-size: 22pt;
  line-height: 1.15;
  margin-bottom: 24pt;
}
.colophon p {
  font-size: 11pt;
  line-height: 1.6;
  margin-bottom: 14pt;
  max-width: 5in;
}
.colophon .meta {
  margin-top: 36pt;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9pt;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  line-height: 2;
}
.colophon .meta strong {
  color: var(--ink);
  font-weight: 500;
}

/* ------------------------------------------------------------------ */
/* TABLE OF CONTENTS                                                  */
/* ------------------------------------------------------------------ */
.toc { background: white; }
.toc h2 {
  font-family: 'Source Serif 4', serif;
  font-weight: 300;
  font-size: 36pt;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 36pt;
}
.toc h2 .em { font-style: italic; color: var(--oxblood); }
.toc .part {
  margin-top: 24pt;
  padding-top: 12pt;
  border-top: 1px solid var(--ink-hairline);
}
.toc .part-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--oxblood);
  margin-bottom: 8pt;
}
.toc .part-name {
  font-family: 'Source Serif 4', serif;
  font-weight: 400;
  font-size: 16pt;
  line-height: 1.2;
  margin-bottom: 12pt;
}
.toc ul { list-style: none; }
.toc li {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 5pt 0;
  font-size: 11pt;
  line-height: 1.4;
  border-bottom: 1px dotted var(--ink-hairline);
}
.toc li .num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9pt;
  color: var(--ink-soft);
  margin-right: 12pt;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  width: 24pt;
}
.toc li .name { flex-grow: 1; color: var(--ink); }
.toc li .page-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10pt;
  color: var(--ink-soft);
  margin-left: 12pt;
  flex-shrink: 0;
}

/* ------------------------------------------------------------------ */
/* CHAPTER DIVIDER PAGE — cream background, large chapter title       */
/* ------------------------------------------------------------------ */
.chapter-divider {
  background: var(--paper);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 1in;
}
.chapter-divider .part-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10pt;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--oxblood);
  margin-bottom: 24pt;
  padding-bottom: 8pt;
  border-bottom: 1px solid var(--oxblood);
  display: inline-block;
  align-self: flex-start;
}
.chapter-divider .ch-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10pt;
  letter-spacing: 0.18em;
  color: var(--ink-soft);
  margin-bottom: 12pt;
}
.chapter-divider h1 {
  font-family: 'Source Serif 4', serif;
  font-weight: 300;
  font-size: 44pt;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 24pt;
  max-width: 6in;
}
.chapter-divider h1 .em {
  font-style: italic;
  color: var(--oxblood);
}
.chapter-divider .dek {
  font-size: 14pt;
  line-height: 1.5;
  color: var(--ink-soft);
  max-width: 5in;
}

/* ------------------------------------------------------------------ */
/* CHAPTER BODY PAGE                                                  */
/* ------------------------------------------------------------------ */
.body-page { background: white; }
.body-page .running-header {
  position: absolute;
  top: 0.4in;
  left: 0.85in;
  right: 1.1in;
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  padding-bottom: 8pt;
  border-bottom: 1px solid var(--ink-hairline);
}
.body-page .running-footer {
  position: absolute;
  bottom: 0.4in;
  left: 0.85in;
  right: 1.1in;
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.14em;
  color: var(--ink-soft);
}
.body-page .body-content p {
  margin-bottom: 9pt;
  text-align: justify;
  hyphens: auto;
  font-size: 10.5pt;
  line-height: 1.55;
}
.body-page .body-content p:first-child::first-letter {
  font-family: 'Source Serif 4', serif;
  font-weight: 700;
  color: var(--oxblood);
  font-size: 4em;
  line-height: 0.85;
  float: left;
  padding-right: 0.08em;
  padding-top: 0.05em;
}
.body-page .body-content p + .pull-quote,
.body-page .body-content p + .callout { margin-top: 14pt; }

/* PULL-QUOTE — for high-leverage statements */
.pull-quote {
  border-left: 3px solid var(--oxblood);
  padding: 8pt 0 8pt 16pt;
  margin: 18pt 0 18pt 8pt;
  font-style: italic;
  font-size: 13pt;
  line-height: 1.4;
  color: var(--ink);
  max-width: 5in;
}
.pull-quote .attribution {
  display: block;
  font-style: normal;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-top: 8pt;
}

/* CALLOUT — for data points or framework chips */
.callout {
  background: var(--paper);
  border-left: 3px solid var(--gold);
  padding: 14pt 18pt;
  margin: 18pt 0;
  page-break-inside: avoid;
  break-inside: avoid;
}
.callout .label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--oxblood);
  margin-bottom: 4pt;
}
.callout .stat {
  font-family: 'Source Serif 4', serif;
  font-weight: 400;
  font-size: 22pt;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 4pt;
}
.callout .gloss {
  font-size: 10pt;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* SUB-HEADINGS within body */
.body-content h3 {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 13pt;
  line-height: 1.2;
  color: var(--ink);
  margin-top: 14pt;
  margin-bottom: 6pt;
}

/* SOURCE CITATIONS — superscript number → footnote-like at bottom */
.source-ref {
  font-size: 0.7em;
  vertical-align: super;
  color: var(--oxblood);
  font-weight: 600;
}

/* ------------------------------------------------------------------ */
/* CONTENT — generated. Replace with the actual chapters at build.    */
/* ------------------------------------------------------------------ */
{{CONTENT}}
</style>
</head>
<body>
{{PAGES}}
</body>
</html>
